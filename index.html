<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checklist de Equipamentos</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap');
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#222638;--surface3:#2a2f47;--border:#2e3450;--accent:#f0a500;--accent2:#e05c00;--text:#e8eaf0;--text-muted:#7a82a0;--ok:#22c55e;--nok:#ef4444;--atencao:#f0a500;--ok-bg:rgba(34,197,94,0.10);--nok-bg:rgba(239,68,68,0.10);--atencao-bg:rgba(240,165,0,0.10);--radius:10px;--shadow:0 4px 24px rgba(0,0,0,0.4)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 80px 0}
.app-header{background:linear-gradient(135deg,#0f1117 60%,#1a1530);border-bottom:2px solid var(--accent);padding:16px 22px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 4px 32px rgba(0,0,0,.6)}
.logo-mark{width:40px;height:40px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;color:#0f1117;flex-shrink:0}
.app-header h1{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:21px;letter-spacing:1px;text-transform:uppercase;color:var(--text);line-height:1}
.app-header h1 span{color:var(--accent)}
.container{max-width:960px;margin:0 auto;padding:22px 14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:18px;box-shadow:var(--shadow)}
.card-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:14px}
.form-row{display:flex;gap:12px;flex-wrap:wrap}
.form-group{display:flex;flex-direction:column;gap:5px;flex:1;min-width:170px}
.form-group label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);font-weight:600}
.form-group input{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;padding:9px 11px;outline:none;transition:border-color .2s}
.form-group input:focus{border-color:var(--accent)}
.form-group input[type="text"]{text-transform:uppercase}
.implemento-selector{display:flex;gap:12px}
.implemento-btn{flex:1;padding:14px 10px;background:var(--surface2);border:2px solid var(--border);border-radius:var(--radius);color:var(--text-muted);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:all .2s;text-align:center}
.implemento-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(240,165,0,.06)}
.implemento-btn.active{border-color:var(--accent);background:rgba(240,165,0,.13);color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.checklist-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;box-shadow:var(--shadow);animation:slideIn .28s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.checklist-header{background:var(--surface2);border-bottom:2px solid var(--accent);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.checklist-header-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.checklist-number{background:var(--accent);color:#0f1117;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;border-radius:4px;padding:2px 7px;letter-spacing:1px}
.checklist-tipo{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;text-transform:uppercase;color:var(--text)}
.placa-field{display:flex;align-items:center;gap:5px}
.placa-field label{font-size:10px;color:var(--text-muted);font-weight:600;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.placa-field input{background:var(--surface3);border:1px solid var(--border);border-radius:5px;color:var(--accent);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;padding:5px 9px;width:112px;text-transform:uppercase;outline:none;letter-spacing:2px;transition:border-color .2s}
.placa-field input:focus{border-color:var(--accent)}
.btn-remove-checklist{background:none;border:1px solid #444;border-radius:6px;color:var(--text-muted);cursor:pointer;font-size:13px;padding:4px 9px;transition:all .2s;margin-left:auto}
.btn-remove-checklist:hover{border-color:var(--nok);color:var(--nok);background:rgba(239,68,68,.08)}
.section-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);background:var(--surface2);border-radius:4px;padding:4px 10px;margin:6px 0 2px}
.checklist-items{padding:10px 12px;display:flex;flex-direction:column;gap:7px}
.item-row{background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:9px 11px;transition:border-color .2s,background .2s}
.item-row.status-ok{border-color:var(--ok);background:var(--ok-bg)}
.item-row.status-nok{border-color:var(--nok);background:var(--nok-bg)}
.item-row.status-atencao{border-color:var(--atencao);background:var(--atencao-bg)}
.item-main{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.item-name{font-weight:600;font-size:13px;flex:1;min-width:110px}
.status-buttons{display:flex;gap:4px}
.btn-status{padding:4px 10px;border-radius:5px;border:1.5px solid transparent;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all .15s;background:var(--surface3);color:var(--text-muted)}
.btn-ok{border-color:var(--ok)}.btn-nok{border-color:var(--nok)}.btn-atencao{border-color:var(--atencao)}
.btn-ok.active{background:var(--ok);color:#fff}.btn-nok.active{background:var(--nok);color:#fff}.btn-atencao.active{background:var(--atencao);color:#0f1117}
.item-extras{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:7px}
.extintor-data{display:flex;align-items:center;gap:5px}
.extintor-data label{font-size:10px;color:var(--text-muted);font-weight:600;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.extintor-data select{background:var(--surface3);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:'Barlow',sans-serif;font-size:12px;padding:4px 6px;outline:none;cursor:pointer}
.btn-obs{background:var(--surface3);border:1px solid var(--border);border-radius:5px;color:var(--text-muted);font-size:11px;padding:4px 9px;cursor:pointer;transition:all .2s;font-family:'Barlow',sans-serif}
.btn-obs:hover{border-color:var(--accent);color:var(--accent)}.btn-obs.has-obs{border-color:var(--accent);color:var(--accent);background:rgba(240,165,0,.08)}
.obs-field{width:100%;margin-top:7px}
.obs-field textarea{width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Barlow',sans-serif;font-size:12px;padding:7px 9px;resize:vertical;min-height:52px;outline:none;text-transform:uppercase;transition:border-color .2s}
.obs-field textarea:focus{border-color:var(--accent)}
.acoes{display:flex;gap:12px;flex-direction:column;margin-top:4px}
.btn-add{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;background:transparent;border:2px dashed var(--border);border-radius:var(--radius);color:var(--text-muted);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-add:hover{border-color:var(--accent);color:var(--accent);background:rgba(240,165,0,.04)}
.btn-add .plus-icon{font-size:20px;font-weight:300;line-height:1}
.btn-pdf{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:17px;background:var(--accent);border:none;border-radius:var(--radius);color:#0f1117;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:17px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;box-shadow:0 4px 24px rgba(240,165,0,.3)}
.btn-pdf:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 6px 32px rgba(240,165,0,.4)}
.btn-pdf:active{transform:none}
#checklist-area{display:none}
@media(max-width:600px){.form-row,.implemento-selector{flex-direction:column}.checklist-header{flex-direction:column;align-items:flex-start}.item-main{flex-direction:column;align-items:flex-start}}
  </style>
</head>
<body>

<header class="app-header">
  <div class="logo-mark">CE</div>
  <h1>Checklist de <span>Equipamentos</span></h1>
</header>

<div class="container">

  <div class="card">
    <div class="card-title">▸ Dados da Vistoria</div>
    <div class="form-row">
      <div class="form-group">
        <label for="conferente">Conferente</label>
        <input type="text" id="conferente" placeholder="NOME DO CONFERENTE" autocomplete="off">
      </div>
      <div class="form-group" style="max-width:175px">
        <label for="data-vistoria">Data</label>
        <input type="date" id="data-vistoria">
      </div>
      <div class="form-group" style="max-width:125px">
        <label for="hora-vistoria">Hora</label>
        <input type="time" id="hora-vistoria">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">▸ Selecione o Implemento</div>
    <div class="implemento-selector">
      <button class="implemento-btn" data-tipo="vanderleia" onclick="selecionarImplemento('vanderleia')">Vanderleia</button>
      <button class="implemento-btn" data-tipo="rodotrem"   onclick="selecionarImplemento('rodotrem')">Rodotrem 9 Eixos</button>
    </div>
  </div>

  <div id="checklist-area">
    <div id="checklists-container"></div>
    <div class="acoes">
      <button class="btn-add" onclick="criarChecklist()">
        <span class="plus-icon">＋</span> Adicionar Checklist
      </button>
      <button class="btn-pdf" onclick="gerarPDF()">⬇ &nbsp;Gerar PDF</button>
    </div>
  </div>

</div>

<script>
const MESES = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
const ANO_BASE = new Date().getFullYear();
const ANOS = Array.from({length:6},(_,i)=>ANO_BASE+i);

let implementoSelecionado = null;
let checklistCount = 0;

function itensBase(){
  return [
    {id:'extintor',    nome:'Extintor',              temData:true },
    {id:'pneus',       nome:'Pneus',                 temData:false},
    {id:'estepe1',     nome:'Estepe 1',              temData:false},
    {id:'estepe2',     nome:'Estepe 2',              temData:false},
    {id:'cantoneiras', nome:'Cantoneiras',            temData:false},
    {id:'catracas',    nome:'Catracas Fixas/Avulsas', temData:false},
    {id:'reguas',      nome:'Réguas',                temData:false},
    {id:'cintas',      nome:'Cintas',                temData:false},
    {id:'lona',        nome:'Lona Teto e Lateral',   temData:false},
    {id:'faixas',      nome:'Faixas Reflexivas',     temData:false},
    {id:'portas',      nome:'Portas',                temData:false},
  ];
}

function onPlacaInput(e){
  let raw = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,7);
  if(raw.length > 3) raw = raw.slice(0,3) + '-' + raw.slice(3);
  e.target.value = raw;
}

function selecionarImplemento(tipo){
  implementoSelecionado = tipo;
  document.querySelectorAll('.implemento-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.implemento-btn[data-tipo="${tipo}"]`).classList.add('active');
  document.getElementById('checklists-container').innerHTML = '';
  checklistCount = 0;
  document.getElementById('checklist-area').style.display = 'block';
  criarChecklist(); // <-- primeiro checklist automático
}

function criarChecklist(){
  if(!implementoSelecionado) return;
  checklistCount++;
  const isR = implementoSelecionado === 'rodotrem';
  const n = checklistCount;

  const block = document.createElement('div');
  block.className = 'checklist-block';
  block.id = 'cl-' + n;

  let hdr = `<div class="checklist-header">
    <div class="checklist-header-left">
      <span class="checklist-number">#${n}</span>
      <span class="checklist-tipo">${isR?'Rodotrem 9 Eixos':'Vanderleia'}</span>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">`;

  if(isR){
    hdr += `
      <div class="placa-field"><label>Placa C1:</label>
        <input type="text" class="placa-input" placeholder="AAA-0000" maxlength="8" oninput="onPlacaInput(event)" data-placa="C1"></div>
      <div class="placa-field"><label>Placa C2:</label>
        <input type="text" class="placa-input" placeholder="AAA-0000" maxlength="8" oninput="onPlacaInput(event)" data-placa="C2"></div>`;
  } else {
    hdr += `
      <div class="placa-field"><label>Placa:</label>
        <input type="text" class="placa-input" placeholder="AAA-0000" maxlength="8" oninput="onPlacaInput(event)" data-placa="VL"></div>`;
  }

  hdr += `<button class="btn-remove-checklist" onclick="removerChecklist(${n})">✕ Remover</button>
    </div></div>`;

  let items = '<div class="checklist-items">';
  if(isR){
    ['Carreta 1','Carreta 2'].forEach((sec,si)=>{
      items += `<div class="section-label">▸ ${sec}</div>`;
      itensBase().forEach(item=>{
        items += renderItem(`${n}_c${si+1}_${item.id}`, item.nome, item.temData);
      });
    });
  } else {
    itensBase().forEach(item=>{
      items += renderItem(`${n}_${item.id}`, item.nome, item.temData);
    });
  }
  items += '</div>';

  block.innerHTML = hdr + items;
  document.getElementById('checklists-container').appendChild(block);
  setTimeout(()=>block.scrollIntoView({behavior:'smooth',block:'nearest'}), 80);
}

function removerChecklist(n){
  if(!confirm('Remover este checklist?')) return;
  const el = document.getElementById('cl-'+n);
  if(el){ el.style.transition='opacity .2s,transform .2s'; el.style.opacity='0'; el.style.transform='translateY(-8px)'; setTimeout(()=>el.remove(),220); }
}

function renderItem(uid, nome, temData){
  const mOpts = MESES.map(m=>`<option value="${m}">${m}</option>`).join('');
  const aOpts = ANOS.map(a=>`<option value="${a}">${a}</option>`).join('');
  return `
  <div class="item-row" id="row-${uid}">
    <div class="item-main">
      <span class="item-name">${nome}</span>
      <div class="status-buttons">
        <button class="btn-status btn-ok"      onclick="setStatus('${uid}','ok',this)">OK</button>
        <button class="btn-status btn-nok"     onclick="setStatus('${uid}','nok',this)">NOK</button>
        <button class="btn-status btn-atencao" onclick="setStatus('${uid}','atencao',this)">—</button>
      </div>
      <button class="btn-obs" id="btnobs-${uid}" onclick="toggleObs('${uid}')">+ OBS</button>
    </div>
    ${temData?`<div class="item-extras"><div class="extintor-data">
      <label>Validade:</label>
      <select id="mes-${uid}">${mOpts}</select>
      <select id="ano-${uid}">${aOpts}</select>
    </div></div>`:''}
    <div class="obs-field" id="obsfield-${uid}" style="display:none">
      <textarea placeholder="OBSERVAÇÃO..." oninput="this.value=this.value.toUpperCase();checkObs('${uid}')"></textarea>
    </div>
  </div>`;
}

function setStatus(uid, status, btn){
  const row = document.getElementById('row-'+uid);
  row.classList.remove('status-ok','status-nok','status-atencao');
  row.querySelectorAll('.btn-status').forEach(b=>b.classList.remove('active'));
  row.classList.add('status-'+status);
  btn.classList.add('active');
}

function toggleObs(uid){
  const f = document.getElementById('obsfield-'+uid);
  const b = document.getElementById('btnobs-'+uid);
  const open = f.style.display !== 'none';
  f.style.display = open?'none':'block';
  b.textContent = open?'+ OBS':'− OBS';
  if(!open) f.querySelector('textarea').focus();
}

function checkObs(uid){
  const ta = document.querySelector('#obsfield-'+uid+' textarea');
  document.getElementById('btnobs-'+uid).classList.toggle('has-obs',!!(ta&&ta.value.trim()));
}

// Uppercase automático em inputs de texto
document.addEventListener('input', function(e){
  if(e.target.tagName==='INPUT' && e.target.type==='text' && !e.target.classList.contains('placa-input')){
    const p = e.target.selectionStart;
    e.target.value = e.target.value.toUpperCase();
    e.target.setSelectionRange(p,p);
  }
});

// Data/hora automática
(function(){
  const now = new Date();
  const pad = n=>String(n).padStart(2,'0');
  document.getElementById('data-vistoria').value =
    `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  document.getElementById('hora-vistoria').value =
    `${pad(now.getHours())}:${pad(now.getMinutes())}`;
})();

// ---- GERAR PDF ----
function gerarPDF(){
  const conferente = (document.getElementById('conferente').value||'—').toUpperCase();
  const dataRaw = document.getElementById('data-vistoria').value;
  const horaRaw = document.getElementById('hora-vistoria').value;
  const dataFmt = dataRaw?(()=>{const[y,m,d]=dataRaw.split('-');return`${d}/${m}/${y}`})():'—';
  const horaFmt = horaRaw||'—';
  const tipoLabel = implementoSelecionado==='rodotrem'?'RODOTREM 9 EIXOS':'VANDERLEIA';

  const blocks = document.querySelectorAll('.checklist-block');
  if(!blocks.length){alert('Adicione pelo menos um checklist antes de gerar o PDF.');return;}

  const clsData = [];
  blocks.forEach((block,idx)=>{
    const placas = [];
    block.querySelectorAll('.placa-input').forEach(inp=>{
      placas.push({label:inp.dataset.placa, valor:inp.value||'—'});
    });
    const secoes = [];
    let secAtual = null;
    block.querySelectorAll('.checklist-items > *').forEach(child=>{
      if(child.classList.contains('section-label')){
        secAtual={label:child.textContent.replace('▸','').trim(),itens:[]};
        secoes.push(secAtual);
      } else if(child.classList.contains('item-row')){
        const nome   = child.querySelector('.item-name').textContent.trim();
        const sc     = [...child.classList].find(c=>c.startsWith('status-'));
        const status = sc?sc.replace('status-',''):'';
        const ta     = child.querySelector('textarea');
        const obs    = ta?ta.value.trim():'';
        const mesEl  = child.querySelector('[id^="mes-"]');
        const anoEl  = child.querySelector('[id^="ano-"]');
        const validade = (mesEl&&anoEl)?`${mesEl.value}/${anoEl.value}`:null;
        if(!secAtual){secoes.push({label:null,itens:[]});secAtual=secoes[secoes.length-1];}
        secAtual.itens.push({nome,status,obs,validade});
      }
    });
    clsData.push({num:idx+1,placas,secoes});
  });

  const corSt = s=>s==='ok'?'#16a34a':s==='nok'?'#dc2626':s==='atencao'?'#d97706':'#9ca3af';
  const lblSt = s=>s==='ok'?'OK':s==='nok'?'NOK':s==='atencao'?'ATENÇÃO':'—';

  const iPDF = item=>{
    const cor=corSt(item.status), lbl=lblSt(item.status);
    return `<div class="pi" style="border-left:3px solid ${cor}">
      <div class="pi-row"><span class="pi-nome">${item.nome}</span><span class="pi-st" style="color:${cor}">${lbl}</span></div>
      ${item.validade?`<div class="pi-ext"><b>Validade: ${item.validade}</b></div>`:''}
      ${item.obs?`<div class="pi-obs">Obs: ${item.obs}</div>`:''}
    </div>`;
  };

  const clPDF = cl=>{
    const placaStr = cl.placas.map(p=>`${p.label}: <b>${p.valor}</b>`).join(' &nbsp;|&nbsp; ');
    let h=`<div class="cl"><div class="cl-hdr">
      <span class="cl-num">#${cl.num}</span>
      <span class="cl-tipo">${tipoLabel}</span>
      <span class="cl-placas">${placaStr}</span>
    </div>`;
    cl.secoes.forEach(sec=>{
      if(sec.label) h+=`<div class="sec-lbl">${sec.label}</div>`;
      const meio=Math.ceil(sec.itens.length/2);
      h+=`<div class="cols">
        <div class="col">${sec.itens.slice(0,meio).map(iPDF).join('')}</div>
        <div class="col">${sec.itens.slice(meio).map(iPDF).join('')}</div>
      </div>`;
    });
    return h+'</div>';
  };

  const htmlPDF=`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<title>Checklist de Equipamentos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;font-size:11px;color:#111;background:#fff;padding:8mm}
@page{size:A4;margin:8mm}
@media print{body{padding:0}}
.hdr{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid #111;padding-bottom:5px;margin-bottom:8px}
.hdr-title{font-size:15px;font-weight:bold;letter-spacing:1px;text-transform:uppercase}
.hdr-meta{font-size:11px;text-align:right;line-height:1.7}
.cl{border:1px solid #ccc;border-radius:3px;margin-bottom:10px;page-break-inside:avoid;overflow:hidden}
.cl-hdr{background:#1a1d27;color:#fff;padding:5px 10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.cl-num{background:#f0a500;color:#000;font-weight:bold;font-size:11px;border-radius:3px;padding:1px 6px}
