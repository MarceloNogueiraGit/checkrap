<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist Sider / Rodotrem – JCE</title>
<style>
/* =====================================================
   RESET / BASE
===================================================== */
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: #f1f3f6; color: #1a1a2e;
  font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px;
}
body { padding: 14px; min-height: 100vh; }

/* =====================================================
TOPO
===================================================== */
.topo {
background: #1e3a5f; color: #fff;
padding: 10px 16px; border-radius: 7px 7px 0 0;
display: flex; align-items: center; gap: 12px;
}
.topo-logo {
font-size: 20px; font-weight: 900; letter-spacing: 1px;
background: #2563a8; padding: 2px 10px; border-radius: 4px; color: #fff;
}
.topo-titulo { font-size: 14px; font-weight: 600; color: #c8daf0; }

/* =====================================================
CABEÇALHO GLOBAL (Conferente + Data)
===================================================== */
.cabecalho-global {
background: #fff; border: 1px solid #d0d7e3;
border-top: none; border-radius: 0 0 7px 7px;
padding: 10px 14px 12px;
display: grid; grid-template-columns: 1fr 1fr 1fr 1fr;
gap: 8px 14px; margin-bottom: 16px;
}
.cabecalho-global label {
font-size: 10px; font-weight: 700; color: #5a6a80;
text-transform: uppercase; letter-spacing: .5px;
display: block; margin-bottom: 4px;
}
.cabecalho-global input {
width: 100%; border: 1px solid #c4cdd8; border-radius: 5px;
padding: 6px 9px; font-size: 13px;
background: #f8fafc; color: #1a1a2e; outline: none;
}
.cabecalho-global input:focus { border-color: #2563a8; background: #fff; }

/* =====================================================
LISTAS
===================================================== */
#listas { display: flex; flex-direction: column; gap: 14px; }

.lista-card {
background: #fff; border: 1px solid #d0d7e3;
border-radius: 7px; overflow: hidden;
box-shadow: 0 1px 4px rgba(0,0,0,.08);
}

/* Header */
.lista-header {
background: #1e3a5f; color: #fff;
padding: 7px 13px; font-size: 13px; font-weight: 700;
display: flex; align-items: center; justify-content: space-between;
gap: 10px; flex-wrap: wrap;
}
.lista-header-left {
display: flex; align-items: center; gap: 12px; flex-wrap: wrap; flex: 1;
}
.lista-header-left span { font-size: 13px; font-weight: 700; white-space: nowrap; }
.lista-placa-group { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.lista-placa-group label {
font-size: 10px; font-weight: 700; color: #aac4e8;
text-transform: uppercase; letter-spacing: .4px; white-space: nowrap;
}
.lista-placa-group input {
width: 88px; border: 1px solid rgba(255,255,255,.3);
border-radius: 4px; padding: 3px 6px; font-size: 12px;
background: rgba(255,255,255,.12); color: #fff;
outline: none; text-transform: uppercase; letter-spacing: .5px;
}
.lista-placa-group input::placeholder { color: rgba(255,255,255,.35); }
.lista-placa-group input:focus { border-color: rgba(255,255,255,.7); background: rgba(255,255,255,.2); }
.btn-remover-lista {
background: transparent; border: 1px solid rgba(255,255,255,.3);
color: rgba(255,255,255,.8); border-radius: 4px; padding: 2px 9px;
cursor: pointer; font-size: 11px; white-space: nowrap; -webkit-appearance: none;
}

/* =====================================================
TABELA TELA
===================================================== */
.checklist-table { width: 100%; border-collapse: collapse; }
.checklist-table th {
background: #edf0f5; color: #5a6a80;
font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .4px;
padding: 5px 8px; text-align: left; border-bottom: 1px solid #d0d7e3;
}
.checklist-table th.th-status { text-align: center; }
.checklist-table th.th-qtd    { text-align: center; width: 60px; }
.checklist-table tr.par td { background: #f7f9fc; }
.checklist-table td {
padding: 5px 8px; border-bottom: 1px solid #e8ecf1;
vertical-align: middle; font-size: 12.5px; color: #1a1a2e; background: #fff;
}
.checklist-table tr:last-child td { border-bottom: none; }
.item-nome { font-weight: 500; }

/* Seção */
.section-row td {
background: #dce8f5 !important; font-size: 10px; font-weight: 800;
text-transform: uppercase; letter-spacing: .6px; color: #1e3a5f;
padding: 3px 8px; border-bottom: 1px solid #b8cfe8 !important;
}
.sec-inner { display: flex; align-items: center; justify-content: space-between; }

/* =====================================================
CHECKBOXES OK / NOK / NA
===================================================== */
.check-group {
display: flex; gap: 4px; justify-content: center;
align-items: center; flex-wrap: nowrap;
}
.check-group label {
display: inline-flex; align-items: center; gap: 3px; cursor: pointer;
font-size: 11px; font-weight: 700; padding: 4px 8px; border-radius: 5px;
border: 1.5px solid #c4cdd8; background: #f1f3f6; color: #6b7a8d;
-webkit-tap-highlight-color: transparent; user-select: none; white-space: nowrap;
transition: background .12s, color .12s, border-color .12s;
min-width: 42px; justify-content: center;
}
.check-group input[type=“checkbox”] {
position: absolute; opacity: 0; width: 0; height: 0;
pointer-events: none; -webkit-appearance: none; appearance: none;
}
.check-group label.ativo-ok  { background: #dcfce7; color: #166534; border-color: #22c55e; font-weight: 900; }
.check-group label.ativo-nok { background: #fee2e2; color: #991b1b; border-color: #ef4444; font-weight: 900; }
.check-group label.ativo-na  { background: #f1f5f9; color: #475569; border-color: #94a3b8; font-weight: 900; }
.chk-mark { display: none; font-size: 10px; }
.check-group label.ativo-ok  .chk-mark,
.check-group label.ativo-nok .chk-mark,
.check-group label.ativo-na  .chk-mark { display: inline; }

/* =====================================================
QUANTIDADE / VALIDADE
===================================================== */
.input-qtd {
width: 50px; border: 1px solid #c4cdd8; border-radius: 4px;
padding: 3px 5px; font-size: 12px; text-align: center;
background: #f8fafc; color: #1a1a2e; display: block; margin: 0 auto;
}
.input-qtd:focus { border-color: #2563a8; outline: none; }
.input-validade {
width: 88px; border: 1px solid #c4cdd8; border-radius: 4px;
padding: 3px 5px; font-size: 11px; text-transform: uppercase; text-align: center;
background: #f8fafc; color: #1a1a2e;
}
.input-validade:focus { border-color: #2563a8; outline: none; }
.validade-wrap { margin-top: 3px; text-align: center; }
.validade-label { font-size: 9px; color: #8a9ab0; display: block; }
.sem-qtd { color: #c4cdd8; display: block; text-align: center; }

/* =====================================================
PNEUS TELA — lado a lado Esq | Dir
===================================================== */
.pneus-col-header {
background: #dce8f5; font-size: 10px; font-weight: 800;
text-transform: uppercase; letter-spacing: .5px; color: #1e3a5f;
padding: 3px 8px; border-bottom: 1px solid #b8cfe8;
}

/* =====================================================
BOTÃO DUPLICAR PNEUS
===================================================== */
.btn-add-pneus {
background: #2563a8; color: #fff; border: none; border-radius: 4px;
padding: 2px 9px; font-size: 10px; font-weight: 700;
cursor: pointer; -webkit-appearance: none;
}

/* =====================================================
BOTÕES INFERIORES
===================================================== */
.botoes-fixos {
display: flex; justify-content: center; gap: 12px;
margin: 10px 0 18px; flex-wrap: wrap;
}
.btn-add-lista {
padding: 10px 28px; background: #1e3a5f; color: #fff;
border: none; border-radius: 7px; font-size: 14px; font-weight: 700;
cursor: pointer; -webkit-appearance: none;
}
.btn-pdf {
padding: 10px 28px; background: #b91c1c; color: #fff;
border: none; border-radius: 7px; font-size: 14px; font-weight: 700;
cursor: pointer; -webkit-appearance: none;
}

/* pdf-cols oculto na tela */
.pdf-cols  { display: none; }
.pneus-wrapper { display: block; }

/* =====================================================
IMPRESSÃO / PDF — P&B, ultra compacto, 3 col por lista
===================================================== */
@media print {

@page { size: A4 portrait; margin: 5mm 4mm; }

- { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

.botoes-fixos, .btn-remover-lista, .btn-add-pneus, .no-print { display: none !important; }

html, body {
background: #fff !important; color: #000 !important;
padding: 0 !important; margin: 0 !important;
}

/* Topo P&B */
.topo {
background: #000 !important; color: #fff !important;
padding: 2px 6px !important; border-radius: 0 !important;
margin-bottom: 0 !important; display: block !important;
}
.topo-logo {
font-size: 8pt !important; padding: 0 4px !important;
background: #444 !important; color: #fff !important;
display: inline-block !important;
}
.topo-titulo { font-size: 7pt !important; color: #ddd !important; }

/* Cabeçalho global: só conferente + data */
.cabecalho-global {
background: #f5f5f5 !important; border: 0.5pt solid #999 !important;
border-top: none !important; border-radius: 0 !important;
padding: 2px 6px !important; margin-bottom: 1.5mm !important;
display: flex !important; gap: 0 !important;
grid-template-columns: unset !important;
}
.cabecalho-global .placa-global { display: none !important; }
.cabecalho-global > div { flex: 1 !important; padding: 0 4px !important; }
.cabecalho-global label {
font-size: 5pt !important; margin-bottom: 1px !important;
color: #333 !important; display: block !important;
}
.cabecalho-global input {
width: 100% !important; background: #fff !important; color: #000 !important;
-webkit-text-fill-color: #000 !important;
border: 0.4pt solid #888 !important; font-size: 6pt !important;
padding: 0 2px !important; display: block !important;
}

/* Listas empilhadas */
#listas { display: block !important; width: 100% !important; }

.lista-card {
display: block !important; width: 100% !important;
border: 0.6pt solid #555 !important; border-radius: 0 !important;
box-shadow: none !important; overflow: visible !important;
margin-bottom: 1.5mm !important;
page-break-inside: avoid !important; break-inside: avoid !important;
float: none !important;
}

/* Header P&B com placas */
.lista-header {
background: #000 !important; color: #fff !important;
padding: 1.5px 5px !important; font-size: 5.5pt !important;
display: flex !important; align-items: center !important;
gap: 5px !important; flex-wrap: nowrap !important;
}
.lista-header-left {
display: flex !important; align-items: center !important;
gap: 5px !important; flex: 1 !important;
}
.lista-header-left span { font-size: 5.5pt !important; }
.lista-placa-group label { font-size: 4.5pt !important; color: #ccc !important; }
.lista-placa-group input {
width: 45pt !important; font-size: 5pt !important;
background: rgba(255,255,255,.15) !important; color: #fff !important;
-webkit-text-fill-color: #fff !important;
border: 0.4pt solid rgba(255,255,255,.5) !important;
padding: 0 2px !important; border-radius: 1px !important;
}

/* Esconde tabela tela e pneus tela */
.checklist-table { display: none !important; }
.pneus-wrapper   { display: none !important; }

/* Mostra pdf-cols */
.pdf-cols { display: block !important; overflow: hidden !important; }

/* 3 colunas flutuantes */
.pdf-col {
float: left !important;
width: 32.6% !important;
margin-right: 1.1% !important;
vertical-align: top !important;
border-right: 0.4pt solid #bbb !important;
padding: 0 2px !important;
}
.pdf-col:last-child { margin-right: 0 !important; border-right: none !important; }

/* Seção P&B */
.pdf-secao {
background: #ddd !important; color: #000 !important;
font-size: 4pt !important; font-weight: 900 !important;
text-transform: uppercase !important; letter-spacing: 0 !important;
padding: 0.5px 2px !important;
border-bottom: 0.4pt solid #999 !important;
margin-top: 1px !important;
}
.pdf-secao:first-child { margin-top: 0 !important; }

/* Item: só aparece se tiver .pdf-item-visible */
.pdf-item { display: none !important; }
.pdf-item.pdf-item-visible {
display: flex !important;
align-items: baseline !important;
padding: 0.4px 2px !important;
border-bottom: 0.3pt solid #ddd !important;
gap: 2px !important;
line-height: 1.1 !important;
}
.pdf-item-nome {
font-size: 4.5pt !important; color: #000 !important;
white-space: nowrap !important; overflow: hidden !important;
text-overflow: ellipsis !important;
flex: 1 !important; min-width: 0 !important;
}
.pdf-item-qtd {
font-size: 4pt !important; color: #000 !important;
white-space: nowrap !important; margin: 0 1px !important;
}
/* Só o marcado aparece — via classe .visible aplicada pelo JS */
.pdf-chk { display: none !important; }
.pdf-chk.visible {
display: inline-block !important;
font-size: 4.5pt !important; font-weight: 900 !important;
padding: 0 2px !important;
border: 0.4pt solid #000 !important;
border-radius: 1pt !important;
background: #fff !important; color: #000 !important;
}
.pdf-val {
font-size: 4pt !important; color: #000 !important;
white-space: nowrap !important; margin-left: 1px !important;
}

/* Pneus PDF P&B */
.pdf-pneus-header {
display: flex !important;
background: #ddd !important; color: #000 !important;
font-size: 4pt !important; font-weight: 900 !important;
text-transform: uppercase !important;
border-bottom: 0.4pt solid #999 !important;
margin-top: 1px !important;
}
.pdf-pneus-header span {
flex: 1 !important; padding: 0.5px 2px !important; font-size: 4pt !important;
}
.pdf-pneus-header span:first-child { border-right: 0.4pt solid #999 !important; }

/* Linha de pneu: oculta se nada marcado */
.pdf-pneus-row { display: none !important; }
.pdf-pneus-row.pdf-item-visible {
display: flex !important;
align-items: center !important;
border-bottom: 0.3pt solid #ddd !important;
}
.pdf-pneus-cell {
flex: 1 !important; display: flex !important;
align-items: center !important; justify-content: space-between !important;
padding: 0.4px 2px !important; gap: 2px !important;
}
.pdf-pneus-cell:first-child { border-right: 0.4pt solid #ccc !important; }
.pdf-pneus-eixo {
font-size: 4.5pt !important; color: #000 !important;
white-space: nowrap !important; flex-shrink: 0 !important;
}
.pdf-pneus-marcado {
font-size: 4.5pt !important; font-weight: 900 !important;
color: #000 !important; white-space: nowrap !important;
border: 0.4pt solid #000 !important;
padding: 0 2px !important; border-radius: 1pt !important;
background: #fff !important;
}
/* Seção pneus: ocultar se todas as linhas estiverem ocultas */
.pdf-pneus-bloco { display: none !important; }
.pdf-pneus-bloco.tem-marcado { display: block !important; }
}
</style>

</head>
<body>

<div class="topo">
  <span class="topo-logo">JCE</span>
  <span class="topo-titulo">Checklist de Conferência – Sider / Rodotrem</span>
</div>

<div class="cabecalho-global">
  <div class="placa-global">
    <label>Placa 1</label>
    <input type="text" id="placa1" placeholder="AAA-0000" maxlength="8" oninput="formatarPlaca(this)">
  </div>
  <div class="placa-global">
    <label>Placa 2</label>
    <input type="text" id="placa2" placeholder="AAA-0000" maxlength="8" oninput="formatarPlaca(this)">
  </div>
  <div>
    <label>Conferente</label>
    <input type="text" id="conferente" placeholder="Nome do conferente">
  </div>
  <div>
    <label>Data</label>
    <input type="date" id="data">
  </div>
</div>

<div id="listas"></div>

<div class="botoes-fixos no-print">
  <button class="btn-add-lista" onclick="adicionarLista()">＋ Adicionar Lista</button>
  <button class="btn-pdf" onclick="gerarPDF()">🖨 Gerar PDF</button>
</div>

<script>
/* ============================================================
   DADOS
   Col 1: Amarração (4) + Segurança (4) = 8
   Col 2: Cobertura (3) + Estrutura início (3) = 6 — bandana, caixas, prot_lateral
   Col 3: Estrutura resto (2) = parachoque, batente
   (Estrutura completa fica distribuída entre col2 e col3,
    mas parachoque e batente ficam em col3 como pedido)
============================================================ */
var COL1 = [
  { secao:'Amarração e Fixação' },
  { id:'cintas',       nome:'Cintas',         qtd:true  },
  { id:'catracas',     nome:'Catracas',       qtd:true  },
  { id:'cantoneiras',  nome:'Cantoneiras',    qtd:true  },
  { id:'reguas',       nome:'Réguas',         qtd:true  },
  { secao:'Segurança' },
  { id:'estepe1',      nome:'Estepe 1',       qtd:false },
  { id:'estepe2',      nome:'Estepe 2',       qtd:false },
  { id:'extintor1',    nome:'Extintor 1',     qtd:false, validade:true },
  { id:'extintor2',    nome:'Extintor 2',     qtd:false, validade:true }
];
var COL2 = [
  { secao:'Cobertura' },
  { id:'lona_lateral', nome:'Lonas Laterais', qtd:false },
  { id:'lona_teto',    nome:'Lona de Teto',   qtd:false },
  { id:'cabo_aco',     nome:'Cabo de Aço',    qtd:false },
  { secao:'Estrutura' },
  { id:'bandana',      nome:'Bandana',        qtd:false },
  { id:'caixas',       nome:'Caixas',         qtd:false },
  { id:'prot_lateral', nome:'Protetor Lateral',qtd:false }
];
var COL3 = [
  { secao:'Estrutura' },
  { id:'parachoque',   nome:'Para-choque',    qtd:false },
  { id:'batente',      nome:'Batente',        qtd:false }
];

/* todos os itens juntos para a tabela de tela */
var ITENS_TELA = COL1.concat(COL2.slice(0)).concat([
  { id:'parachoque', nome:'Para-choque', qtd:false },
  { id:'batente',    nome:'Batente',     qtd:false }
]);
/* Remover duplicata de Estrutura secao */
var ITENS_TELA = [];
var secVistas = {};
function addItens(arr) {
  for (var i = 0; i < arr.length; i++) {
    var it = arr[i];
    if (it.secao) {
      if (!secVistas[it.secao]) { ITENS_TELA.push(it); secVistas[it.secao] = true; }
    } else { ITENS_TELA.push(it); }
  }
}
addItens(COL1); addItens(COL2); addItens(COL3);

var EIXOS = [
  { eixo:'1º Eixo', esq:'p_1e', dir:'p_1d' },
  { eixo:'2º Eixo', esq:'p_2e', dir:'p_2d' },
  { eixo:'3º Eixo', esq:'p_3e', dir:'p_3d' }
];

var contadorListas = 0;
var pneusCount = {};

/* ---- Utilitários ---- */
function formatarPlaca(input) {
  var v = input.value.toUpperCase().replace(/[^A-Z0-9]/g,'');
  if (v.length > 3) v = v.slice(0,3) + '-' + v.slice(3,7);
  input.value = v;
}

function toggleCheck(uid, tipo) {
  var tipos = ['ok','nok','na'];
  for (var i = 0; i < tipos.length; i++) {
    var t = tipos[i];
    var chk = document.getElementById('chk_' + t + '_' + uid);
    if (!chk) continue;
    var lbl = chk.parentElement;
    if (t === tipo) {
      lbl.classList[chk.checked ? 'add' : 'remove']('ativo-' + t);
    } else {
      chk.checked = false;
      lbl.classList.remove('ativo-' + t);
    }
  }
}

function criarCheckGroup(uid) {
  return '<div class="check-group">'
    + '<label><input type="checkbox" id="chk_ok_'  + uid + '" onchange="toggleCheck(\'' + uid + '\',\'ok\')"><span class="chk-mark">✓</span>OK</label>'
    + '<label><input type="checkbox" id="chk_nok_' + uid + '" onchange="toggleCheck(\'' + uid + '\',\'nok\')"><span class="chk-mark">✓</span>NOK</label>'
    + '<label><input type="checkbox" id="chk_na_'  + uid + '" onchange="toggleCheck(\'' + uid + '\',\'na\')"><span class="chk-mark">✓</span>NA</label>'
    + '</div>';
}

/* ---- Linhas tela ---- */
function criarLinha(item, listaId, isPar) {
  if (item.secao) {
    return '<tr class="section-row"><td colspan="3"><div class="sec-inner"><span>' + item.secao + '</span></div></td></tr>';
  }
  var uid = listaId + '_' + item.id;
  var cls = isPar ? ' class="par"' : '';
  var colQtd = item.qtd
    ? '<input class="input-qtd" type="number" min="0" id="qtd_' + uid + '" placeholder="0">'
    : '<span class="sem-qtd">—</span>';
  var valHtml = item.validade
    ? '<div class="validade-wrap"><span class="validade-label">Validade</span>'
      + '<input class="input-validade" type="text" id="val_' + uid + '" placeholder="MMM/AAAA" maxlength="8" oninput="this.value=this.value.toUpperCase()"></div>'
    : '';
  return '<tr' + cls + ' id="row_' + uid + '">'
    + '<td class="item-nome">' + item.nome + '</td>'
    + '<td style="text-align:center;">' + colQtd + '</td>'
    + '<td>' + criarCheckGroup(uid) + valHtml + '</td>'
    + '</tr>';
}

/* ---- Gera HTML de coluna PDF a partir de array de itens ---- */
function gerarColPdf(arr, listaId) {
  var html = '';
  var secaoAtual = null;
  for (var i = 0; i < arr.length; i++) {
    var it = arr[i];
    if (it.secao) {
      if (it.secao !== secaoAtual) {
        html += '<div class="pdf-secao">' + it.secao + '</div>';
        secaoAtual = it.secao;
      }
      continue;
    }
    var uid = listaId + '_' + it.id;
    var qtdSpan = it.qtd ? '<span class="pdf-item-qtd" id="pdfqtd_' + uid + '"></span>' : '';
    var valSpan = it.validade ? '<span class="pdf-val" id="pdfval_' + uid + '"></span>' : '';
    html += '<div class="pdf-item" id="pdfrow_' + uid + '">'
      + '<span class="pdf-item-nome">' + it.nome + '</span>'
      + qtdSpan
      + '<span class="pdf-chk" id="pdf_ok_'  + uid + '">OK</span>'
      + '<span class="pdf-chk" id="pdf_nok_' + uid + '">NOK</span>'
      + '<span class="pdf-chk" id="pdf_na_'  + uid + '">NA</span>'
      + valSpan
      + '</div>';
  }
  return html;
}

/* ---- Pneus tela ---- */
function criarPneusWrapper(listaId, idx) {
  var label = idx === 1 ? 'Pneus' : 'Pneus – Módulo ' + idx;
  var html = '<div id="pw_' + listaId + '_' + idx + '" class="pneus-wrapper">';
  /* header seção */
  html += '<div style="background:#dce8f5;font-size:10px;font-weight:800;text-transform:uppercase;'
    + 'letter-spacing:.6px;color:#1e3a5f;padding:3px 8px;border-bottom:1px solid #b8cfe8;">'
    + '<div class="sec-inner"><span>' + label + '</span>'
    + '<button class="btn-add-pneus no-print" onclick="adicionarPneus(\'' + listaId + '\')">＋ Duplicar</button>'
    + '</div></div>';
  /* cabeçalhos E/D */
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;">'
    + '<div class="pneus-col-header" style="border-right:1px solid #b8cfe8;">◀ Esquerdo</div>'
    + '<div class="pneus-col-header">Direito ▶</div>'
    + '</div>';
  /* eixos */
  for (var i = 0; i < EIXOS.length; i++) {
    var e = EIXOS[i];
    var uidE = listaId + '_pn' + idx + '_' + e.esq;
    var uidD = listaId + '_pn' + idx + '_' + e.dir;
    var bg   = i % 2 === 1 ? '#f7f9fc' : '#fff';
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;">'
      + '<div style="padding:4px 8px;border-bottom:1px solid #e8ecf1;border-right:1px solid #e8ecf1;background:' + bg + ';">'
      + '<div style="font-size:11px;font-weight:600;margin-bottom:2px;">' + e.eixo + '</div>'
      + criarCheckGroup(uidE) + '</div>'
      + '<div style="padding:4px 8px;border-bottom:1px solid #e8ecf1;background:' + bg + ';">'
      + '<div style="font-size:11px;font-weight:600;margin-bottom:2px;">' + e.eixo + '</div>'
      + criarCheckGroup(uidD) + '</div>'
      + '</div>';
  }
  html += '</div>';
  return html;
}

/* ---- Pneus PDF ---- */
function criarPdfPneus(listaId, idx) {
  var label = idx === 1 ? 'Pneus' : 'Pneus – Módulo ' + idx;
  var html = '<div class="pdf-pneus-bloco" id="pdf_pbloco_' + listaId + '_' + idx + '">'
    + '<div class="pdf-pneus-header"><span>◀ ' + label + ' – Esq.</span><span>Dir. ▶</span></div>';
  for (var i = 0; i < EIXOS.length; i++) {
    var e = EIXOS[i];
    var uidE = listaId + '_pn' + idx + '_' + e.esq;
    var uidD = listaId + '_pn' + idx + '_' + e.dir;
    html += '<div class="pdf-pneus-row" id="pdf_prow_' + uidE + '">'
      + '<div class="pdf-pneus-cell">'
      + '<span class="pdf-pneus-eixo">' + e.eixo + '</span>'
      + '<span class="pdf-pneus-marcado" id="pdf_pmarcado_' + uidE + '"></span>'
      + '</div>'
      + '<div class="pdf-pneus-cell">'
      + '<span class="pdf-pneus-eixo">' + e.eixo + '</span>'
      + '<span class="pdf-pneus-marcado" id="pdf_pmarcado_' + uidD + '"></span>'
      + '</div>'
      + '</div>';
  }
  html += '</div>';
  return html;
}

/* ---- Adicionar pneus ---- */
function adicionarPneus(listaId) {
  pneusCount[listaId] = (pneusCount[listaId] || 1) + 1;
  var idx = pneusCount[listaId];
  var wrapper = document.getElementById('pneus_main_' + listaId);
  var tmp = document.createElement('div');
  tmp.innerHTML = criarPneusWrapper(listaId, idx);
  while (tmp.firstChild) wrapper.appendChild(tmp.firstChild);
  /* adiciona bloco pdf de pneus */
  var pdfP = document.getElementById('pdf_pneus_area_' + listaId);
  if (pdfP) {
    var tmp2 = document.createElement('div');
    tmp2.innerHTML = criarPdfPneus(listaId, idx);
    while (tmp2.firstChild) pdfP.appendChild(tmp2.firstChild);
  }
}

/* ---- Adicionar lista ---- */
function adicionarLista() {
  contadorListas++;
  var listaId = 'L' + contadorListas;
  pneusCount[listaId] = 1;

  /* Tabela tela */
  var linhas = '';
  var parIdx = 0;
  for (var i = 0; i < ITENS_TELA.length; i++) {
    var it = ITENS_TELA[i];
    if (it.secao) { linhas += criarLinha(it, listaId, false); }
    else { linhas += criarLinha(it, listaId, parIdx % 2 === 1); parIdx++; }
  }

  /* PDF 3 colunas */
  var pdfCol1 = gerarColPdf(COL1, listaId);
  var pdfCol2 = gerarColPdf(COL2, listaId);
  var pdfCol3 = gerarColPdf(COL3, listaId);

  var card = document.createElement('div');
  card.className = 'lista-card';
  card.id = 'card_' + listaId;
  card.innerHTML =
    /* Header com placas */
    '<div class="lista-header">'
    + '<div class="lista-header-left">'
    + '<span>Lista nº ' + contadorListas + '</span>'
    + '<div class="lista-placa-group">'
    + '<label>Placa 1</label><input type="text" id="lp1_' + listaId + '" placeholder="AAA-0000" maxlength="8" oninput="formatarPlaca(this)">'
    + '<label>Placa 2</label><input type="text" id="lp2_' + listaId + '" placeholder="AAA-0000" maxlength="8" oninput="formatarPlaca(this)">'
    + '</div></div>'
    + '<button class="btn-remover-lista no-print" onclick="removerLista(\'' + listaId + '\')">✕ Remover</button>'
    + '</div>'
    /* Tabela tela */
    + '<table class="checklist-table"><thead><tr>'
    + '<th>Item</th><th class="th-qtd">Qtd.</th><th class="th-status">Status</th>'
    + '</tr></thead><tbody>' + linhas + '</tbody></table>'
    /* Pneus tela */
    + '<div id="pneus_main_' + listaId + '">'
    + criarPneusWrapper(listaId, 1)
    + '</div>'
    /* PDF cols */
    + '<div class="pdf-cols" id="pdf_cols_' + listaId + '">'
    + '<div class="pdf-col">' + pdfCol1 + '</div>'
    + '<div class="pdf-col">' + pdfCol2 + '</div>'
    + '<div class="pdf-col">' + pdfCol3
    +   '<div id="pdf_pneus_area_' + listaId + '">'
    +     criarPdfPneus(listaId, 1)
    +   '</div>'
    + '</div>'
    + '</div>';

  document.getElementById('listas').appendChild(card);
  card.scrollIntoView({ behavior:'smooth', block:'start' });
}

/* ---- Remover lista ---- */
function removerLista(listaId) {
  var card = document.getElementById('card_' + listaId);
  if (card && confirm('Remover esta lista?')) card.remove();
}

/* ---- GERAR PDF: sincroniza e aplica visibilidade ---- */
function gerarPDF() {
  var cards = document.querySelectorAll('.lista-card');

  for (var c = 0; c < cards.length; c++) {
    var card = cards[c];

    /* --- Itens normais --- */
    var pdfItems = card.querySelectorAll('.pdf-item');
    for (var i = 0; i < pdfItems.length; i++) {
      var row = pdfItems[i];
      var uid = row.id.replace('pdfrow_', '');
      var marcado = null;

      /* descobre o que foi marcado */
      var tipos = ['ok','nok','na'];
      for (var t = 0; t < tipos.length; t++) {
        var chk = document.getElementById('chk_' + tipos[t] + '_' + uid);
        var pdfChk = document.getElementById('pdf_' + tipos[t] + '_' + uid);
        if (pdfChk) pdfChk.classList.remove('visible');
        if (chk && chk.checked) {
          marcado = tipos[t];
          if (pdfChk) pdfChk.classList.add('visible');
        }
      }

      /* qtd */
      var qtdEl = document.getElementById('qtd_' + uid);
      var pdfQtd = document.getElementById('pdfqtd_' + uid);
      if (pdfQtd) pdfQtd.textContent = (qtdEl && qtdEl.value) ? 'x' + qtdEl.value : '';

      /* validade */
      var valEl = document.getElementById('val_' + uid);
      var pdfVal = document.getElementById('pdfval_' + uid);
      if (pdfVal) pdfVal.textContent = (valEl && valEl.value) ? valEl.value : '';

      /* mostra linha só se algo foi marcado */
      if (marcado !== null) {
        row.classList.add('pdf-item-visible');
      } else {
        row.classList.remove('pdf-item-visible');
      }
    }

    /* --- Pneus --- */
    var pRows = card.querySelectorAll('.pdf-pneus-row');
    for (var p = 0; p < pRows.length; p++) {
      var pRow = pRows[p];
      var uidE = pRow.id.replace('pdf_prow_', '');
      /* uidE é o esquerdo; derive direito trocando _e por _d ou _esq/_dir */
      /* O id do lado direito é o uidE com último char trocado e→d */
      var uidD = uidE.slice(0, -1) + 'd';

      var marcadoE = null, marcadoD = null;
      var tiposP = ['ok','nok','na'];
      for (var tp = 0; tp < tiposP.length; tp++) {
        var chkE = document.getElementById('chk_' + tiposP[tp] + '_' + uidE);
        var chkD = document.getElementById('chk_' + tiposP[tp] + '_' + uidD);
        if (chkE && chkE.checked) marcadoE = tiposP[tp].toUpperCase();
        if (chkD && chkD.checked) marcadoD = tiposP[tp].toUpperCase();
      }

      var spanE = document.getElementById('pdf_pmarcado_' + uidE);
      var spanD = document.getElementById('pdf_pmarcado_' + uidD);
      if (spanE) spanE.textContent = marcadoE || '';
      if (spanD) spanD.textContent = marcadoD || '';

      if (marcadoE !== null || marcadoD !== null) {
        pRow.classList.add('pdf-item-visible');
      } else {
        pRow.classList.remove('pdf-item-visible');
      }
    }

    /* Mostra/oculta bloco de pneus */
    var pblocos = card.querySelectorAll('.pdf-pneus-bloco');
    for (var pb = 0; pb < pblocos.length; pb++) {
      var bloco = pblocos[pb];
      var temMarcado = bloco.querySelectorAll('.pdf-pneus-row.pdf-item-visible').length > 0;
      bloco.classList[temMarcado ? 'add' : 'remove']('tem-marcado');
    }
  }

  window.print();
}

/* ---- Init ---- */
document.addEventListener('DOMContentLoaded', function() {
  var h = new Date();
  document.getElementById('data').value =
    h.getFullYear() + '-'
    + String(h.getMonth()+1).padStart(2,'0') + '-'
    + String(h.getDate()).padStart(2,'0');
  adicionarLista();
});
