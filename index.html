<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist Sider / Rodotrem – JCE</title>
<style>
/* =====================================================
   DARK MODE – TELA
===================================================== */
:root {
  --bg:         #0f1117;
  --bg2:        #1a1d27;
  --bg3:        #22263a;
  --borda:      #2e3348;
  --borda2:     #3a4060;
  --texto:      #dde1f0;
  --texto2:     #8b93b5;
  --azul:       #1e4080;
  --azul-h:     #2563c8;
  --azul-topo:  #162d60;
  --secao-bg:   #1c2540;
  --secao-txt:  #7eb3f5;
  --row-par:    #1e2135;
  --ok:         #22c55e;
  --ok-bg:      #052e16;
  --ok-borda:   #166534;
  --nok:        #ef4444;
  --nok-bg:     #2d0b0b;
  --nok-borda:  #7f1d1d;
  --na:         #94a3b8;
  --na-bg:      #1e2233;
  --na-borda:   #3a4060;
  --input-bg:   #141720;
  --sombra:     0 2px 8px rgba(0,0,0,.5);
}

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
font-family: ‘Segoe UI’, Arial, sans-serif;
background: var(–bg);
color: var(–texto);
font-size: 14px;
padding: 14px;
min-height: 100vh;
}

/* =====================================================
TOPO
===================================================== */
.topo {
background: var(–azul-topo);
color: #fff;
padding: 10px 16px;
border-radius: 7px 7px 0 0;
display: flex;
align-items: center;
gap: 12px;
border-bottom: 2px solid var(–azul-h);
}
.topo-logo {
font-size: 21px; font-weight: 900; letter-spacing: 1px;
background: var(–azul-h);
padding: 2px 11px; border-radius: 5px;
color: #fff;
}
.topo-titulo { font-size: 15px; font-weight: 600; color: #c9d8f5; }

/* =====================================================
CABEÇALHO
===================================================== */
.cabecalho-global {
background: var(–bg2);
border: 1px solid var(–borda);
border-top: none;
border-radius: 0 0 7px 7px;
padding: 10px 14px 12px;
display: grid;
grid-template-columns: 1fr 1fr 1fr 1fr;
gap: 8px 14px;
margin-bottom: 16px;
}
.cabecalho-global label {
font-size: 10px; font-weight: 700; color: var(–texto2);
text-transform: uppercase; letter-spacing: .5px;
display: block; margin-bottom: 4px;
}
.cabecalho-global input {
width: 100%;
border: 1px solid var(–borda2);
border-radius: 5px;
padding: 6px 9px;
font-size: 13px;
background: var(–input-bg);
color: var(–texto);
outline: none;
transition: border .15s;
}
.cabecalho-global input:focus { border-color: var(–azul-h); }
.cabecalho-global input::placeholder { color: var(–texto2); opacity: .5; }

/* date input no dark */
input[type=“date”]::-webkit-calendar-picker-indicator { filter: invert(.7); }

/* =====================================================
CONTAINER LISTAS (tela)
===================================================== */
#listas { display: flex; flex-direction: column; gap: 16px; }

/* =====================================================
CARD
===================================================== */
.lista-card {
background: var(–bg2);
border: 1px solid var(–borda);
border-radius: 7px;
overflow: hidden;
box-shadow: var(–sombra);
}
.lista-header {
background: var(–azul);
color: #fff;
padding: 7px 13px;
font-size: 13px; font-weight: 700;
display: flex; align-items: center; justify-content: space-between;
letter-spacing: .3px;
}
.btn-remover-lista {
background: none;
border: 1px solid rgba(255,255,255,.3);
color: rgba(255,255,255,.8);
border-radius: 4px; padding: 2px 9px;
cursor: pointer; font-size: 11px;
transition: all .12s;
}
.btn-remover-lista:hover { background: rgba(255,0,0,.25); border-color: #ef4444; color: #fff; }

/* =====================================================
TABELA
===================================================== */
.checklist-table { width: 100%; border-collapse: collapse; }

.checklist-table th {
background: var(–bg3);
color: var(–texto2);
font-size: 10px; font-weight: 800;
text-transform: uppercase; letter-spacing: .4px;
padding: 5px 9px; text-align: left;
border-bottom: 1px solid var(–borda2);
}
.checklist-table th.th-status { text-align: center; width: 136px; }
.checklist-table th.th-qtd    { text-align: center; width: 64px; }

.checklist-table tr:nth-child(even):not(.section-row) td { background: var(–row-par); }

.checklist-table td {
padding: 4px 9px;
border-bottom: 1px solid var(–borda);
vertical-align: middle;
font-size: 12.5px;
color: var(–texto);
}
.checklist-table tr:last-child td { border-bottom: none; }
.item-nome { font-weight: 500; }

/* =====================================================
SEÇÃO
===================================================== */
.section-row td {
background: var(–secao-bg) !important;
font-size: 10px; font-weight: 800;
text-transform: uppercase; letter-spacing: .6px;
color: var(–secao-txt) !important;
padding: 4px 9px;
border-bottom: 1px solid var(–borda2) !important;
}
.sec-inner { display: flex; align-items: center; justify-content: space-between; }

/* =====================================================
CHECKBOXES OK / NOK / NA
===================================================== */
.check-group {
display: flex; gap: 5px;
justify-content: center; align-items: center;
}
.check-group label {
display: inline-flex; align-items: center; gap: 3px;
cursor: pointer;
font-size: 11px; font-weight: 700;
padding: 3px 8px; border-radius: 4px;
border: 1.5px solid var(–borda2);
background: var(–bg3); color: var(–texto2);
transition: all .1s; user-select: none; white-space: nowrap;
}
.check-group input[type=“checkbox”] { display: none; }

/* classes aplicadas via JS – compatível Safari iOS */
.check-group label.ativo-ok  {
background: var(–ok-bg);  color: var(–ok);  border-color: var(–ok-borda);  font-weight: 900;
}
.check-group label.ativo-nok {
background: var(–nok-bg); color: var(–nok); border-color: var(–nok-borda); font-weight: 900;
}
.check-group label.ativo-na  {
background: var(–na-bg);  color: var(–na);  border-color: var(–na-borda);  font-weight: 900;
}

.chk-box {
width: 11px; height: 11px;
border: 1.5px solid currentColor;
border-radius: 2px;
display: inline-block; flex-shrink: 0; position: relative;
}
.check-group label.ativo-ok .chk-box::after,
.check-group label.ativo-nok .chk-box::after,
.check-group label.ativo-na  .chk-box::after {
content: ‘✓’; position: absolute;
top: -2px; left: 0; font-size: 10px; line-height: 1;
}

/* =====================================================
QUANTIDADE / VALIDADE
===================================================== */
.input-qtd {
width: 50px;
border: 1px solid var(–borda2);
border-radius: 4px; padding: 3px 5px;
font-size: 12px; text-align: center;
background: var(–input-bg); color: var(–texto);
display: block; margin: 0 auto;
}
.input-qtd:focus { border-color: var(–azul-h); outline: none; }

.input-validade {
width: 80px;
border: 1px solid var(–borda2);
border-radius: 4px; padding: 3px 5px;
font-size: 11px; text-transform: uppercase; text-align: center;
background: var(–input-bg); color: var(–texto);
}
.input-validade:focus { border-color: var(–azul-h); outline: none; }
.input-validade::placeholder { color: var(–texto2); opacity: .5; }

.validade-wrap { margin-top: 3px; text-align: center; }
.validade-label { font-size: 9px; color: var(–texto2); display: block; }

/* =====================================================
BOTÃO DUPLICAR PNEUS
===================================================== */
.btn-add-pneus {
background: var(–azul-h); color: #fff;
border: none; border-radius: 4px;
padding: 2px 9px; font-size: 10px; font-weight: 700;
cursor: pointer; letter-spacing: 0;
transition: background .12s;
}
.btn-add-pneus:hover { background: #1a4da8; }

/* =====================================================
BOTÕES INFERIORES
===================================================== */
.botoes-fixos {
display: flex; justify-content: center; gap: 12px;
margin: 10px 0 18px;
}
.btn-add-lista {
padding: 10px 30px;
background: var(–azul); color: #fff;
border: 1px solid var(–azul-h);
border-radius: 7px; font-size: 14px; font-weight: 700;
cursor: pointer; box-shadow: var(–sombra);
transition: background .15s;
}
.btn-add-lista:hover { background: var(–azul-h); }

.btn-pdf {
padding: 10px 30px;
background: #7f1d1d; color: #fff;
border: 1px solid #b91c1c;
border-radius: 7px; font-size: 14px; font-weight: 700;
cursor: pointer; box-shadow: var(–sombra);
transition: background .15s;
}
.btn-pdf:hover { background: #b91c1c; }

/* =====================================================
IMPRESSÃO / PDF
Layout: A4 landscape, 3 colunas, cada lista = 1 col
3 listas por página; 4ª lista → nova página
===================================================== */
@media print {

@page {
size: A4 portrait;
margin: 6mm 5mm 6mm 5mm;
}

/* Reset cores para branco no print */

- { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

/* Ocultar controles */
.botoes-fixos, .btn-remover-lista, .btn-add-pneus, .no-print {
display: none !important;
}

body {
background: #fff !important;
color: #111 !important;
padding: 0;
font-size: 7pt;
}

/* –– Topo –– */
.topo {
background: #1a3060 !important;
color: #fff !important;
padding: 3px 8px;
border-radius: 2px 2px 0 0;
border-bottom: 1.5pt solid #3060c0 !important;
margin-bottom: 0;
}
.topo-logo  { font-size: 9pt !important; padding: 1px 5px !important; background: #2563a8 !important; }
.topo-titulo { font-size: 7.5pt !important; color: #c0d0f0 !important; }

/* –– Cabeçalho campos –– */
.cabecalho-global {
background: #f5f7fa !important;
border: 0.4pt solid #aab !important;
border-top: none !important;
border-radius: 0 0 2px 2px !important;
padding: 3px 8px 4px !important;
gap: 2px 8px !important;
margin-bottom: 3mm !important;
}
.cabecalho-global label {
color: #445 !important;
font-size: 5.5pt !important;
margin-bottom: 1px !important;
}
.cabecalho-global input {
background: #fff !important;
color: #111 !important;
border: 0.4pt solid #99a !important;
font-size: 6.5pt !important;
padding: 1px 3px !important;
}

/* –– Grade 3 colunas –– */
#listas {
display: grid !important;
grid-template-columns: repeat(3, 1fr) !important;
gap: 2.5mm !important;
align-items: start !important;
}

/* –– Card –– */
.lista-card {
background: #fff !important;
border: 0.5pt solid #9aabb8 !important;
border-radius: 2px !important;
box-shadow: none !important;
overflow: hidden !important;
break-inside: avoid !important;
page-break-inside: avoid !important;
}

/* 4ª lista (índice 1 de nova fileira de 3) → nova página */
.lista-card:nth-child(3n + 1):not(:first-child) {
break-before: page !important;
page-break-before: always !important;
}

/* –– Header do card –– */
.lista-header {
background: #1a3060 !important;
color: #fff !important;
padding: 2px 5px !important;
font-size: 6.5pt !important;
}

/* –– Tabela –– */
.checklist-table th {
background: #dde3ec !important;
color: #334 !important;
font-size: 5pt !important;
padding: 1.5px 3px !important;
letter-spacing: 0 !important;
border-bottom: 0.5pt solid #aab !important;
}
.checklist-table th.th-status { width: auto !important; }
.checklist-table th.th-qtd    { width: auto !important; }

.checklist-table tr:nth-child(even):not(.section-row) td {
background: #f5f8fc !important;
}
.checklist-table td {
background: #fff;
color: #111 !important;
font-size: 5.5pt !important;
padding: 1px 3px !important;
border-bottom: 0.3pt solid #d0d8e4 !important;
vertical-align: middle !important;
}
.checklist-table tr:last-child td { border-bottom: none !important; }

/* –– Seção –– */
.section-row td {
background: #dbe6f5 !important;
color: #1a3060 !important;
font-size: 5pt !important;
padding: 1.5px 3px !important;
border-bottom: 0.5pt solid #aabbd0 !important;
letter-spacing: 0 !important;
}

/* –– Checkboxes –– */
.check-group { gap: 2px !important; }
.check-group label {
background: #f0f3f7 !important;
color: #445 !important;
border: 0.4pt solid #99a !important;
padding: 1px 3px !important;
font-size: 5pt !important;
border-radius: 2px !important;
gap: 2px !important;
}
.check-group label.ativo-ok {
background: #d1fae5 !important;
color: #065f46 !important;
border-color: #059669 !important;
font-weight: 900 !important;
}
.check-group label.ativo-nok {
background: #fee2e2 !important;
color: #991b1b !important;
border-color: #dc2626 !important;
font-weight: 900 !important;
}
.check-group label.ativo-na {
background: #f1f5f9 !important;
color: #475569 !important;
border-color: #94a3b8 !important;
font-weight: 900 !important;
}

.chk-box {
width: 6px !important; height: 6px !important;
border-width: 0.5pt !important;
}
.check-group label.ativo-ok  .chk-box::after,
.check-group label.ativo-nok .chk-box::after,
.check-group label.ativo-na  .chk-box::after {
font-size: 6px !important; top: -1px !important;
}

/* –– Quantidade / Validade –– */
.input-qtd {
width: 20pt !important;
background: #fff !important; color: #111 !important;
border: 0.4pt solid #99a !important;
font-size: 5pt !important; padding: 0 2px !important;
}
.input-validade {
width: 34pt !important;
background: #fff !important; color: #111 !important;
border: 0.4pt solid #99a !important;
font-size: 5pt !important; padding: 0 2px !important;
}
.validade-label { font-size: 4.5pt !important; color: #778 !important; }
.validade-wrap  { margin-top: 1px !important; }
}
</style>

</head>
<body>

<!-- TOPO -->

<div class="topo">
  <span class="topo-logo">JCE</span>
  <span class="topo-titulo">Checklist de Conferência – Sider / Rodotrem</span>
</div>

<!-- CABEÇALHO -->

<div class="cabecalho-global">
  <div>
    <label>Placa 1</label>
    <input type="text" id="placa1" placeholder="AAA-0000" maxlength="8" oninput="formatarPlaca(this)">
  </div>
  <div>
    <label>Placa 2</label>
    <input type="text" id="placa2" placeholder="AAA-0000" maxlength="8" oninput="formatarPlaca(this)">
  </div>
  <div>
    <label>Conferente</label>
    <input type="text" id="conferente" placeholder="Nome do conferente">
  </div>
  <div>
    <label>Data</label>
    <input type="date" id="data">
  </div>
</div>

<!-- LISTAS -->

<div id="listas"></div>

<!-- BOTÕES -->

<div class="botoes-fixos no-print">
  <button class="btn-add-lista" onclick="adicionarLista()">＋ Adicionar Lista</button>
  <button class="btn-pdf" onclick="window.print()">🖨 Gerar PDF / Imprimir</button>
</div>

<script>
/* ============================================================
   DADOS
============================================================ */
const ITENS = [
  { secao: 'Amarração e Fixação' },
  { id:'cintas',       nome:'Cintas',         qtd:true  },
  { id:'catracas',     nome:'Catracas',       qtd:true  },
  { id:'cantoneiras',  nome:'Cantoneiras',    qtd:true  },
  { id:'reguas',       nome:'Réguas',         qtd:true  },

  { secao: 'Segurança' },
  { id:'estepe1',      nome:'Estepe 1',       qtd:false },
  { id:'estepe2',      nome:'Estepe 2',       qtd:false },
  { id:'extintor1',    nome:'Extintor 1',     qtd:false, validade:true },
  { id:'extintor2',    nome:'Extintor 2',     qtd:false, validade:true },

  { secao: 'Cobertura' },
  { id:'lona_lateral', nome:'Lonas Laterais', qtd:false },
  { id:'lona_teto',    nome:'Lona de Teto',   qtd:false },
  { id:'cabo_aco',     nome:'Cabo de Aço',    qtd:false },

  { secao: 'Estrutura' },
  { id:'bandana',      nome:'Bandana',        qtd:false },
  { id:'caixas',       nome:'Caixas',         qtd:false },
  { id:'prot_lateral', nome:'Protetor Lateral ("mata cachorro")', qtd:false },
  { id:'parachoque',   nome:'Para-choque',    qtd:false },
  { id:'batente',      nome:'Batente',        qtd:false },
];

const PNEUS = [
  { id:'p_1e', nome:'1º Eixo – Esquerdo' },
  { id:'p_1d', nome:'1º Eixo – Direito'  },
  { id:'p_2e', nome:'2º Eixo – Esquerdo' },
  { id:'p_2d', nome:'2º Eixo – Direito'  },
  { id:'p_3e', nome:'3º Eixo – Esquerdo' },
  { id:'p_3d', nome:'3º Eixo – Direito'  },
];

let contadorListas = 0;
const pneusCount = {};

/* ============================================================
   PLACA
============================================================ */
function formatarPlaca(input) {
  let v = input.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
  if (v.length > 3) v = v.slice(0,3) + '-' + v.slice(3,7);
  input.value = v;
}

/* ============================================================
   TOGGLE CHECK – só um marcado por vez
============================================================ */
function toggleCheck(uid, tipo) {
  var tipos = ['ok','nok','na'];
  tipos.forEach(function(t) {
    var chk = document.getElementById('chk_' + t + '_' + uid);
    if (!chk) return;
    var lbl = chk.closest('label') || chk.parentElement;
    if (t === tipo) {
      // o browser já fez o toggle do checked; sincroniza a classe
      if (chk.checked) {
        lbl.classList.add('ativo-' + t);
      } else {
        lbl.classList.remove('ativo-' + t);
      }
    } else {
      // desmarca os outros
      chk.checked = false;
      lbl.classList.remove('ativo-' + t);
    }
  });
}

/* ============================================================
   CHECK GROUP HTML
============================================================ */
function criarCheckGroup(uid) {
  return '<div class="check-group">'
    + '<label><input type="checkbox" class="chk-ok"  id="chk_ok_'  + uid + '" onchange="toggleCheck(\'' + uid + '\',\'ok\')"><span class="chk-box"></span>OK</label>'
    + '<label><input type="checkbox" class="chk-nok" id="chk_nok_' + uid + '" onchange="toggleCheck(\'' + uid + '\',\'nok\')"><span class="chk-box"></span>NOK</label>'
    + '<label><input type="checkbox" class="chk-na"  id="chk_na_'  + uid + '" onchange="toggleCheck(\'' + uid + '\',\'na\')"><span class="chk-box"></span>NA</label>'
    + '</div>';
}

/* ============================================================
   LINHA
============================================================ */
function criarLinha(item, listaId) {
  if (item.secao) {
    return '<tr class="section-row"><td colspan="3"><span>' + item.secao + '</span></td></tr>';
  }
  const uid = listaId + '_' + item.id;

  const colQtd = item.qtd
    ? '<input class="input-qtd" type="number" min="0" id="qtd_' + uid + '" placeholder="0">'
    : '<span style="color:#3a4060;display:block;text-align:center;">—</span>';

  const valHtml = item.validade
    ? '<div class="validade-wrap"><span class="validade-label">Validade</span>'
      + '<input class="input-validade" type="text" id="val_' + uid + '" placeholder="MMM/AAAA" maxlength="8" oninput="this.value=this.value.toUpperCase()"></div>'
    : '';

  return '<tr id="row_' + uid + '">'
    + '<td class="item-nome">' + item.nome + '</td>'
    + '<td style="text-align:center;">' + colQtd + '</td>'
    + '<td>' + criarCheckGroup(uid) + valHtml + '</td>'
    + '</tr>';
}

/* ============================================================
   SEÇÃO PNEUS
============================================================ */
function renderPneusSecao(listaId, idx) {
  const label = idx === 1 ? 'Pneus' : 'Pneus – Módulo ' + idx;
  const linhas = PNEUS.map(function(p) {
    const uid = listaId + '_pn' + idx + '_' + p.id;
    return '<tr id="row_' + uid + '">'
      + '<td class="item-nome">' + p.nome + '</td>'
      + '<td style="text-align:center;"><span style="color:#3a4060;display:block;text-align:center;">—</span></td>'
      + '<td>' + criarCheckGroup(uid) + '</td>'
      + '</tr>';
  }).join('');

  return '<tr class="section-row" id="secpneus_' + listaId + '_' + idx + '">'
    + '<td colspan="3"><div class="sec-inner"><span>' + label + '</span>'
    + '<button class="btn-add-pneus no-print" onclick="adicionarPneus(\'' + listaId + '\')">＋ Duplicar</button>'
    + '</div></td></tr>'
    + linhas;
}

function adicionarPneus(listaId) {
  pneusCount[listaId] = (pneusCount[listaId] || 1) + 1;
  const idx   = pneusCount[listaId];
  const tbody = document.querySelector('#card_' + listaId + ' .checklist-table tbody');
  const tmp   = document.createElement('tbody');
  tmp.innerHTML = renderPneusSecao(listaId, idx);
  while (tmp.firstChild) tbody.appendChild(tmp.firstChild);
}

/* ============================================================
   ADICIONAR LISTA
============================================================ */
function adicionarLista() {
  contadorListas++;
  const listaId = 'L' + contadorListas;
  pneusCount[listaId] = 1;

  const linhas    = ITENS.map(function(item){ return criarLinha(item, listaId); }).join('');
  const pneusHtml = renderPneusSecao(listaId, 1);

  const card = document.createElement('div');
  card.className = 'lista-card';
  card.id = 'card_' + listaId;
  card.innerHTML =
    '<div class="lista-header">'
    + '<span>Lista nº ' + contadorListas + '</span>'
    + '<button class="btn-remover-lista no-print" onclick="removerLista(\'' + listaId + '\')">✕ Remover</button>'
    + '</div>'
    + '<table class="checklist-table">'
    + '<thead><tr>'
    + '<th>Item</th>'
    + '<th class="th-qtd">Qtd.</th>'
    + '<th class="th-status">Status</th>'
    + '</tr></thead>'
    + '<tbody>' + linhas + pneusHtml + '</tbody>'
    + '</table>';

  document.getElementById('listas').appendChild(card);
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ============================================================
   REMOVER LISTA
============================================================ */
function removerLista(listaId) {
  const card = document.getElementById('card_' + listaId);
  if (card && confirm('Remover esta lista?')) card.remove();
}

/* ============================================================
   INIT
============================================================ */
document.addEventListener('DOMContentLoaded', function() {
  const h = new Date();
  document.getElementById('data').value =
    h.getFullYear() + '-'
    + String(h.getMonth() + 1).padStart(2, '0') + '-'
    + String(h.getDate()).padStart(2, '0');
  adicionarLista();
});
</script>
